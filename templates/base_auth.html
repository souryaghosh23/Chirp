{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Playpen Sans Deva:wght@500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <title>{%block title%}Chirp{%endblock%}</title>
    <style>
        body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f6f7f7;
        position: relative;
        }

      /* background bird */
        .background-bird {
        position: fixed;
        right: -100px;
        top: 50%;
        transform: translateY(-50%);
        width: 1100px; /* bigger bird */
        opacity: 0.18; /* more visible */
        pointer-events: none;
        z-index: 0;
        }

      /* header */

        .header {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 4px; /* tighter spacing */
        font-size: 28px; /* slightly bigger title */
        font-weight: 500;
        z-index: 2;
        font-family: 'Playpen Sans Deva', sans-serif;
        }
        .verify-btn {
        width: 100%;
        border: none;
        padding: 12px;
        border-radius: 25px;
        font-size: 14px;
        color: white;
        background: linear-gradient(90deg, #3aa7a3, #4a7bd1);
        cursor: pointer;
        }
        .logo-bird {
        width: 100px;
        height: 100px;
        object-fit: contain;
        display: block;
        margin-right: -30px; /* pulls text closer to bird */
        }
    </style>
      {% block extra_css %}
      {% endblock %}
  </head>

  <body>
    <!-- background bird -->
    <img class="background-bird" src="{% static 'images/bird_bg.png' %}" />

    <!-- header -->
    <div class="header">
      <img class="logo-bird" src="{% static 'images/chirp_logo.svg' %}" />
      <span>Chirp</span>
    </div>

      {%block body%}{%endblock%}
  </body>
</html>
