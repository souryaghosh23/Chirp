{%extends 'base_auth.html'%} {% block title %}Chirp - Verify OTP{% endblock %}
<!-- card -->
{%block extra_css%}
<style>
  body {
    margin: 0;
    font-family:
      system-ui,
      -apple-system,
      Segoe UI,
      Roboto;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f6f7f7;
    position: relative;
  }

  /* background bird */
  .background-bird {
    position: fixed;
    right: -100px;
    top: 50%;
    transform: translateY(-50%);
    width: 1100px; /* bigger bird */
    opacity: 0.18; /* more visible */
    pointer-events: none;
    z-index: 0;
  }

  /* header */

  .header {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 4px; /* tighter spacing */
    font-size: 28px; /* slightly bigger title */
    font-weight: 500;
    z-index: 2;
    font-family: "Playpen Sans Deva", sans-serif;
  }

  /* card */

  .card {
    position: relative;
    z-index: 10;
    width: 360px;
    background: white;
    border-radius: 20px;
    padding: 40px 35px;
    text-align: center;
    box-shadow: 0 10px 35px rgba(0, 0, 0, 0.15);
  }

  /* title */

  .title {
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 10px;
    font-family: "Playpen Sans Dev", sans-serif;
  }

  /* description */

  .desc {
    font-size: 14px;
    color: #666;
    margin-bottom: 25px;
  }

  /* otp */

  .otp-wrapper {
    position: relative;
    width: 280px;
    margin: 30px auto;
  }

  .otp-hidden {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 60px;

    opacity: 0;

    z-index: 3;
    cursor: text;
  }

  /* visual boxes */
  .otp-slots {
    display: flex;
    justify-content: space-between;
  }

  .otp-slots span {
    width: 42px;
    height: 55px;
    border-radius: 12px;

    border: 2px solid #e2e8f0;
    background: #f9fafb;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 24px;
    font-weight: 600;

    transition: all 0.25s ease;
  }

  /* green focus glow */
  .otp-wrapper:focus-within span {
    border-color: #25d366;
    box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
  }

  /* filled animation */
  .otp-slots span.filled {
    background: #ecfdf5;
    border-color: #25d366;

    transform: translateY(-3px);
  }

  /* button */

  .verify-btn {
    width: 100%;
    border: none;
    padding: 12px;
    border-radius: 25px;
    font-size: 14px;
    color: white;
    background: linear-gradient(90deg, #3aa7a3, #4a7bd1);
    cursor: pointer;
  }

  /* footer */

  .footer {
    margin-top: 20px;
    font-size: 13px;
    color: #888;
  }

  .links {
    margin-top: 25px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
  }

  .links a {
    text-decoration: none;
    color: #666;
  }
  .logo-bird {
    width: 100px;
    height: 100px;
    object-fit: contain;
    display: block;
    margin-right: -30px; /* pulls text closer to bird */
  }
</style>
{%endblock%} {%block body%}
<div class="card">
  <div class="title">Verify OTP</div>

  <div class="desc">
    Enter the 6-digit verification code sent to <br />
    <strong>{{ masked_phone }}</strong>
  </div>

  <form method="POST">
    {% csrf_token %}

    <div class="otp-wrapper">
      <input
        type="text"
        name="otp"
        maxlength="6"
        inputmode="numeric"
        class="otp-hidden"
        required
      />

      <div class="otp-slots">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <button class="verify-btn">Verify & Continue</button>
  </form>

  <div class="footer">
    <span id="timer">Resend in 30s</span>
    <br />
    <a id="resendLink" href="{% url 'resend_otp' %}" style="display: none">
      Resend OTP
    </a>
    <br />
    Need help?
  </div>
</div>
<script>
  let timeLeft = 30;

  const timerElement = document.getElementById("timer");
  const resendLink = document.getElementById("resendLink");

  const countdown = setInterval(() => {
    if (timeLeft > 0) {
      timerElement.innerText = "Resend in " + timeLeft + "s";
      timeLeft--;
    } else {
      clearInterval(countdown);
      timerElement.style.display = "none";
      resendLink.style.display = "inline";
    }
  }, 1000);

  const input = document.querySelector(".otp-hidden");
  const slots = document.querySelectorAll(".otp-slots span");
  const wrapper = document.querySelector(".otp-wrapper");

  // click anywhere → focus input
  wrapper.addEventListener("click", () => {
    input.focus();
  });

  // update boxes when typing
  input.addEventListener("input", () => {
    const value = input.value;

    slots.forEach((slot, index) => {
      slot.textContent = value[index] || "";
      slot.classList.toggle("filled", value[index]);
    });
  });

  // autofocus when page loads
  window.addEventListener("load", () => {
    input.focus();
  });
</script>
{%endblock%}
