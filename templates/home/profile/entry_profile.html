{%extends 'base_auth.html'%} {% load static %} {% block title %}Chirp - Set Up
Profie {% endblock %}
<!-- card -->
{%block extra_css%}
<link
  href="https://fonts.googleapis.com/icon?family=Material+Icons"
  rel="stylesheet"
/>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
  }

  body {
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* Main card */

  .profile-card {
    width: 420px;
    background: white;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    text-align: center;
  }

  /* Title */

  .title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .subtitle {
    color: #667781;
    font-size: 14px;
    margin-bottom: 30px;
  }

  /* Avatar uploader */

  .avatar-wrapper {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 25px auto;
  }

  .avatar-wrapper img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #e4e6eb;
  }

  .avatar-upload {
    position: absolute;
    bottom: 0;
    right: 0;
    background: linear-gradient(90deg, #3aa7a3, #4a7bd1);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
  }

  .avatar-upload input {
    display: none;
  }

  .avatar-upload svg {
    width: 16px;
    fill: white;
  }

  /* Name input */

  .input-group {
    margin-bottom: 25px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid #d1d7db;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
  }

  input:focus {
    border-color: linear-gradient(90deg, #3aa7a3, #4a7bd1);
    box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.12);
  }

  /* Continue button */

  button {
    width: 100%;
    border: none;
    padding: 12px;
    border-radius: 25px;
    font-size: 14px;
    color: white;
    background: linear-gradient(90deg, #3aa7a3, #4a7bd1);
    cursor: pointer;

    transition:
      transform 0.18s ease,
      box-shadow 0.18s ease;
  }
  button:active {
    transform: translateY(-1px);
    box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
  }
</style>
{%endblock%} {%block body%}
<div class="profile-card">
  <div class="title">Set up your profile</div>
  <div class="subtitle">
    Add a name and photo so your friends can recognize you
  </div>

  <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="avatar-wrapper">
      <img
        id="avatarPreview"
        src="{% if user.profile_picture %}{{ user.profile_picture.url }}{% else %}{% static 'images/default-avatar.png' %}{% endif %}"
      />

      <label class="avatar-upload">
        <input
          type="file"
          name="profile_photo"
          id="avatarInput"
          accept="image/*"
        />
        <span class="material-icons">camera_alt</span>
      </label>
    </div>

    <div class="input-group">
      <input
        type="text"
        name="display_name"
        placeholder="Enter your name"
        value="{{ user.username|default:'' }}"
        required
      />
    </div>

    <button type="submit">Continue</button>
  </form>
</div>

<script>
  const avatarInput = document.getElementById("avatarInput");
  const avatarPreview = document.getElementById("avatarPreview");

  avatarInput.addEventListener("change", function () {
    const file = this.files[0];

    if (file) {
      const reader = new FileReader();

      reader.onload = function (e) {
        avatarPreview.src = e.target.result;
      };

      reader.readAsDataURL(file);
    }
  });
</script>
{%endblock%}
